<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#060810">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FinDash">
  <title>Trent's Finance Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#060810;--bg1:#0b0f1a;--bg2:#101522;--bg3:#141926;
      --border:#1c2540;--border2:#253060;
      --gold:#f0b429;--gold2:#ffd166;--gold-bg:rgba(240,180,41,.09);
      --green:#34d399;--green-bg:rgba(52,211,153,.09);
      --red:#f87171;--red-bg:rgba(248,113,113,.09);
      --blue:#60a5fa;--purple:#a78bfa;
      --text:#dde4f0;--muted:#5a6a88;--dim:#1c2540;
      --mono:'Space Mono',monospace;--sans:'Outfit',sans-serif;
      --nav-h:65px;
    }
    html,body{background:var(--bg);color:var(--text);font-family:var(--sans);
      min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    #app{max-width:480px;margin:0 auto;min-height:100dvh}

    /* Layout */
    .page{padding:calc(env(safe-area-inset-top)+18px) 16px calc(var(--nav-h)+env(safe-area-inset-bottom)+20px);
          animation:fadeUp .22s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

    /* Nav */
    .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
         width:100%;max-width:480px;height:calc(var(--nav-h)+env(safe-area-inset-bottom));
         padding-bottom:env(safe-area-inset-bottom);
         background:rgba(5,7,15,.97);backdrop-filter:blur(24px);
         border-top:1px solid var(--border);display:flex;z-index:100}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
             justify-content:center;gap:3px;background:none;border:none;
             color:var(--muted);cursor:pointer;padding:8px 4px;transition:color .2s;
             -webkit-tap-highlight-color:transparent}
    .nav-btn.active{color:var(--gold)}
    .nav-icon{font-size:18px;line-height:1}
    .nav-label{font-size:10px;font-weight:600;letter-spacing:.03em}

    /* Cards */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
    .card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px}

    /* Type */
    .page-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:14px}
    .section-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;
                   text-transform:uppercase;margin:18px 0 8px}
    .big-num{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--gold);letter-spacing:-.02em;line-height:1}
    .med-num{font-family:var(--mono);font-size:17px;font-weight:700;line-height:1}
    .sm-num{font-family:var(--mono);font-size:13px;line-height:1}
    .label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase}

    /* Tags */
    .tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.06em;
         text-transform:uppercase;padding:2px 6px;border-radius:4px}
    .tag-gold{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(240,180,41,.25)}
    .tag-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.25)}
    .tag-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.25)}
    .tag-blue{background:rgba(96,165,250,.09);color:var(--blue);border:1px solid rgba(96,165,250,.25)}
    .tag-purple{background:rgba(167,139,250,.09);color:var(--purple);border:1px solid rgba(167,139,250,.25)}

    /* Utils */
    .flex-between{display:flex;align-items:center;justify-content:space-between}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .stat-block{display:flex;flex-direction:column;gap:3px}
    .divider{height:1px;background:var(--border);margin:12px 0}

    /* Progress */
    .prg-wrap{background:var(--bg3);border-radius:6px;height:6px;overflow:hidden;margin:8px 0}
    .prg-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .5s}

    /* NW bar */
    .nw-bar{display:flex;height:5px;border-radius:4px;overflow:hidden;margin:10px 0 8px;gap:2px}
    .nw-seg{height:100%;border-radius:2px}

    /* Countdown */
    .cd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:8px}
    .cd-unit{background:var(--bg3);border-radius:10px;padding:8px 4px;text-align:center}
    .cd-num{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--gold);line-height:1}
    .cd-lbl{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600;letter-spacing:.06em}

    /* Pill tabs */
    .pill-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;gap:2px;margin-bottom:12px}
    .pill-tab{flex:1;padding:7px 4px;border:none;background:none;color:var(--muted);border-radius:7px;
              font-family:var(--sans);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;
              -webkit-tap-highlight-color:transparent}
    .pill-tab.active{background:var(--bg2);color:var(--gold);box-shadow:0 1px 6px rgba(0,0,0,.5)}

    /* Metric btns */
    .metric-btn{padding:5px 10px;border-radius:6px;border:none;cursor:pointer;
                font-family:var(--sans);font-size:11px;font-weight:700;transition:all .15s;
                -webkit-tap-highlight-color:transparent}

    /* Property list */
    .prop-list-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;
                    padding:14px 12px;margin-bottom:8px;cursor:pointer;
                    display:flex;align-items:center;gap:12px;-webkit-tap-highlight-color:transparent}
    .prop-list-card:active{opacity:.7}
    .prop-accent{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:52px}

    /* Back */
    .back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;
              color:var(--muted);font-family:var(--sans);font-size:13px;font-weight:500;
              cursor:pointer;padding:0;margin-bottom:14px;-webkit-tap-highlight-color:transparent}

    /* Chart */
    .chart-wrap{position:relative;height:185px;margin-top:10px}

    /* Investments */
    .inv-row{display:flex;align-items:center;justify-content:space-between;
             padding:9px 0;border-bottom:1px solid var(--border)}
    .inv-row:last-child{border-bottom:none}
    .ticker{font-family:var(--mono);font-size:10px;font-weight:700;background:var(--bg3);
            border:1px solid var(--border2);color:var(--muted);padding:2px 6px;border-radius:4px}

    /* History table */
    .history-wrap{overflow-x:auto;margin-top:10px;border-radius:10px;border:1px solid var(--border)}
    .history-table{width:100%;border-collapse:collapse;min-width:360px}
    .history-table th{color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase;
                      font-size:9px;padding:8px;text-align:right;background:var(--bg3);
                      border-bottom:1px solid var(--border);white-space:nowrap}
    .history-table th:first-child{text-align:left}
    .history-table td{padding:7px 8px;border-bottom:1px solid var(--dim);font-family:var(--mono);
                      text-align:right;font-size:11px;white-space:nowrap}
    .history-table td:first-child{text-align:left;font-family:var(--sans);font-weight:600;
                                  font-size:11px;color:var(--muted)}
    .history-table tr:last-child td{border-bottom:none;color:var(--gold);font-weight:700}
    .history-table tr:last-child td:first-child{color:var(--gold)}

    /* Snapshot form */
    .snap-form{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-top:8px}
    .snap-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .snap-input{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;
                color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 10px;
                width:130px;text-align:right;-webkit-appearance:none}
    .snap-input:focus{outline:none;border-color:var(--gold)}
    .snap-btn{background:var(--gold);color:var(--bg);border:none;border-radius:8px;
              padding:10px;font-family:var(--sans);font-size:13px;font-weight:800;
              cursor:pointer;width:100%;margin-top:6px;letter-spacing:.02em}

    /* Settings */
    .setting-row{display:flex;align-items:center;justify-content:space-between;
                 padding:9px 0;border-bottom:1px solid var(--border)}
    .setting-row:last-child{border-bottom:none}
    .setting-input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
                   color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 10px;
                   text-align:right;width:115px;-webkit-appearance:none}
    .setting-input:focus{outline:none;border-color:var(--gold)}
    .btn-danger{background:var(--red-bg);border:1px solid rgba(248,113,113,.3);color:var(--red);
                border-radius:10px;padding:12px;font-family:var(--sans);font-size:13px;font-weight:700;
                cursor:pointer;width:100%;margin-top:8px}

    /* Phase card */
    .phase-card{border-radius:0 12px 12px 0;padding:12px 14px 12px 16px;margin-bottom:8px;
                background:var(--bg2);border:1px solid var(--border);border-left-width:3px}

    /* Install */
    .install-banner{background:linear-gradient(135deg,var(--gold-bg),rgba(240,180,41,.12));
                    border:1px solid rgba(240,180,41,.3);border-radius:12px;
                    padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .install-btn{background:var(--gold);color:var(--bg);border:none;border-radius:8px;
                 padding:7px 14px;font-family:var(--sans);font-size:12px;font-weight:800;cursor:pointer}

    /* Loading */
    .loading{display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:14px}
    @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
    .loading-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 1s ease infinite}

    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
  </style>
</head>
<body>
<div id="app"><div class="loading"><div class="loading-dot"></div><span style="color:var(--muted);font-size:13px">Loading…</span></div></div>
<script type="module">
import{h,render,Fragment}from'https://esm.sh/preact@10';
import{useState,useEffect,useRef,useMemo,useCallback}from'https://esm.sh/preact@10/hooks';
import htm from'https://esm.sh/htm@3';
import Chart from'https://esm.sh/chart.js@4/auto';
const html=htm.bind(h);

/* ═══════════════════════════════════════════════════════════════
   SEED DATA — realistic VIC growth trajectories from purchase year
═══════════════════════════════════════════════════════════════ */
// Expenses breakdown per property (estimated actuals):
// Management ~8%, Council rates, insurance, maintenance, water ≈ 22% gross rent avg
const EXP_RATIO = 0.22;

function seedSnaps(p){
  const end=2026, n=end-p.yr;
  if(n<=0)return[];
  const vgr=Math.pow(p.val/p.cost,1/n)-1;
  const rgr=0.035; // 3.5% annual rent growth (VIC long-term avg)
  const initRent=p.rent/Math.pow(1+rgr,n);
  const initLoan=p.cost*0.78; // ~78% LVR at purchase
  return Array.from({length:n+1},(_,i)=>{
    const year=p.yr+i;
    const value=Math.round(p.cost*Math.pow(1+vgr,i));
    const wRent=Math.round(initRent*Math.pow(1+rgr,i));
    const aRent=wRent*52;
    const loan=Math.max(p.loan,Math.round(initLoan*Math.pow(0.92,i)));
    const exp=Math.round(aRent*EXP_RATIO);
    const intCost=Math.round(loan*0.061);
    const grossY=aRent/value*100;
    const netY=(aRent-exp-intCost)/value*100;
    const equity=value-loan;
    return{year,value,wRent,aRent,loan,exp,intCost,
           grossY:+grossY.toFixed(3),netY:+netY.toFixed(3),equity};
  });
}

// Raw property definitions — all from Trent's actual data
const RAW_PROPS=[
  {id:1,name:'Doveton 1',suburb:'Doveton',addr:'1/66 Power Rd',
   yr:2003,cost:138000,val:475000,rent:380,loan:25000},
  {id:2,name:'Doveton 2',suburb:'Doveton',addr:'2/66 Power Rd',

  {id:3,name:'Pakenham',suburb:'Pakenham',addr:'6/31 Syme Rd',
   yr:2018,cost:350000,val:508000,rent:500,loan:25000},
  {id:4,name:'Reservoir',suburb:'Reservoir',addr:'5/29 Macartney St',
   yr:2014,cost:188000,val:330000,rent:400,loan:25000,trust:true},
];
const PC=['#f0b429','#34d399','#60a5fa','#a78bfa'];

/* ═══════════════════════════════════════════════════════════════
   DEFAULT STATE
═══════════════════════════════════════════════════════════════ */
const STORAGE_KEY='trent_findash_v3';

const DEFAULT={
  currentAge:46, retirementAge:55, superAccessAge:60,
  salary:97000, debtFreeMonths:18, passiveTarget:80000,
  pprValue:550000, totalLoan:100000, loanRate:6.09,

  asxPersonal:11507, asxTrust:6270, crypto:28496, investGrowth:7.0,
  properties:RAW_PROPS.map(p=>({...p,snaps:seedSnaps(p)})),
};

/* ═══════════════════════════════════════════════════════════════
   STATIC HOLDINGS (from uploaded CSVs — 14 May 2026)
═══════════════════════════════════════════════════════════════ */
const CRYPTO_HOLD=[
  {t:'BNB', n:'BNB Chain',     aud:13697.83, g:21.06,  shares:14.82},
  {t:'BTC', n:'Bitcoin',       aud:6563.08,  g:0.80,   shares:0.0599},

/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */
const fmtFull=n=>`$${Math.round(n||0).toLocaleString('en-AU')}`;
const fmt=n=>{
  if(!n||isNaN(n))return'$0';
  if(n>=1e6)return`$${(n/1e6).toFixed(2)}M`;
  if(n>=1e3)return`$${(n/1e3).toFixed(0)}k`;
  return`$${Math.round(n)}`;
};
const pct=n=>`${n>=0?'+':''}${(n||0).toFixed(1)}%`;
const cc=n=>n>=0?'var(--green)':'var(--red)';

/* ═══════════════════════════════════════════════════════════════
   CALC — all financial overview numbers
═══════════════════════════════════════════════════════════════ */
const calcAll=s=>{
  const grossRent=s.properties.reduce((a,p)=>a+p.rent*52,0);
  const netRent=grossRent*(1-s.expRatio/100)-s.totalLoan*s.loanRate/100;
  const ipValue=s.properties.reduce((a,p)=>a+p.val,0);
  const propValue=ipValue+s.pprValue;
  const propEquity=propValue-s.totalLoan;
  const usAUD=s.usStocksUSD/s.audUsd;
  const investments=usAUD+s.asxPersonal+s.asxTrust+s.crypto;
  const netWorth=propEquity+s.superBal+investments;

  const yToR=Math.max(0,s.retirementAge-s.currentAge);
  const yToS=Math.max(0,s.superAccessAge-s.currentAge);
  const now=new Date();
  const retDate=new Date(now);retDate.setFullYear(now.getFullYear()+yToR);
  const dfDate=new Date(now);dfDate.setMonth(now.getMonth()+s.debtFreeMonths);
  const rtD=Math.max(0,Math.round((retDate-now)/864e5));
  const dfD=Math.max(0,Math.round((dfDate-now)/864e5));

  const r=s.superGrowth/100;
  const superProj=Array.from({length:21},(_,i)=>i===0?Math.round(s.superBal)
    :Math.round(s.superBal*Math.pow(1+r,i)+s.superContrib*((Math.pow(1+r,i)-1)/r)));
  const superAt=superProj[Math.min(yToS,20)];

  const passProj=Array.from({length:16},(_,i)=>{
    const gf=Math.pow(1+s.rentGrowth/100,i);
    return Math.round(grossRent*gf*(1-s.expRatio/100)-(i<s.debtFreeMonths/12?s.totalLoan*s.loanRate/100:0));
  });
  const nwProj=Array.from({length:21},(_,i)=>
    Math.round(propValue*Math.pow(1+s.propGrowth/100,i)-Math.max(0,s.totalLoan*Math.pow(.88,i))
      +superProj[Math.min(i,20)]+investments*Math.pow(1+s.investGrowth/100,i)));

  const grossYield=grossRent/ipValue*100;
  const progressNow=Math.min(100,netRent/s.passiveTarget*100);
  const progressPost=Math.min(100,passProj[Math.ceil(s.debtFreeMonths/12)]/s.passiveTarget*100);

  return{grossRent,netRent,propValue,ipValue,propEquity,usAUD,investments,netWorth,
    yToR,superAt,superProj,passProj,nwProj,grossYield,progressNow,progressPost,
    retDate,dfDate,
    rYr:Math.floor(rtD/365),rMo:Math.floor((rtD%365)/30),rDy:rtD%30,
    dfYr:Math.floor(dfD/365),dfMo:Math.floor((dfD%365)/30),dfDy:dfD%30,
    retPassive:passProj[Math.min(yToR,15)],
    retNW:nwProj[Math.min(yToR,20)],
  };
};

/* ═══════════════════════════════════════════════════════════════
   CHART PRIMITIVES
═══════════════════════════════════════════════════════════════ */
const mkOpts=(yFmt,extra={})=>({
  responsive:true,maintainAspectRatio:false,
  interaction:{intersect:false,mode:'index'},
  plugins:{legend:{display:false},
    tooltip:{backgroundColor:'#1a2038',titleColor:'#8892b0',borderColor:'#1e2a45',borderWidth:1,
             callbacks:{label:ctx=>` ${ctx.dataset.label||''} ${yFmt(ctx.raw)}`}}},
  scales:{
    y:{ticks:{color:'#5a6a88',font:{family:"'Space Mono'",size:10},callback:yFmt},
       grid:{color:'#1c2540'},border:{display:false}},
    x:{ticks:{color:'#5a6a88',font:{size:10},maxTicksLimit:8},grid:{display:false},border:{display:false}}
  },...extra
});

function useChart(make,deps){
  const r=useRef(null),ch=useRef(null);
  useEffect(()=>{
    if(!r.current)return;
    ch.current?.destroy();
    ch.current=make(r.current);
    return()=>ch.current?.destroy();
  },deps);
  return r;
}

const LineChart=({data,labels,color='#f0b429',yFmt=v=>v,fill=true})=>{
  const r=useChart(c=>new Chart(c,{type:'line',
    data:{labels,datasets:[{data,borderColor:color,backgroundColor:fill?color+'18':'transparent',
          fill,tension:.4,pointRadius:0,pointHoverRadius:5,borderWidth:2}]},
    options:mkOpts(yFmt)
  }),[data.join(','),color]);
  return html`<div class="chart-wrap"><canvas ref=${r}></canvas></div>`;
};

const DualLine=({d1,d2,l1,l2,labels,c1,c2,yFmt})=>{
  const r=useChart(c=>new Chart(c,{type:'line',
    data:{labels,datasets:[
      {label:l1,data:d1,borderColor:c1,backgroundColor:c1+'18',fill:true,tension:.4,pointRadius:0,borderWidth:2},
      {label:l2,data:d2,borderColor:c2,backgroundColor:'transparent',fill:false,tension:.4,pointRadius:0,borderWidth:2,borderDash:[5,4]},
    ]},options:mkOpts(yFmt)
  }),[d1.join(','),d2.join(',')]);
  return html`<div class="chart-wrap"><canvas ref=${r}></canvas></div>`;
};

const BarChart=({data,labels,yFmt=v=>v})=>{
  const r=useChart(c=>new Chart(c,{type:'bar',
    data:{labels,datasets:[{data,
      backgroundColor:data.map(v=>v>=0?'rgba(240,180,41,.7)':'rgba(248,113,113,.7)'),
      borderColor:data.map(v=>v>=0?'#f0b429':'#f87171'),borderWidth:1,borderRadius:3}]},
    options:mkOpts(yFmt)
  }),[data.join(',')]);
  return html`<div class="chart-wrap"><canvas ref=${r}></canvas></div>`;
};

const MultiLine=({datasets,labels,yFmt=v=>v})=>{
  const key=datasets.map(d=>d.data.join(',')).join('|');
  const r=useChart(c=>new Chart(c,{type:'line',data:{labels,datasets},
    options:{...mkOpts(yFmt),plugins:{...mkOpts(yFmt).plugins,legend:{display:false}}}
  }),[key]);
  return html`<div class="chart-wrap"><canvas ref=${r}></canvas></div>`;
};

const DonutChart=({segs})=>{
  const r=useChart(c=>new Chart(c,{type:'doughnut',
    data:{labels:segs.map(s=>s.l),datasets:[{data:segs.map(s=>s.v),
          backgroundColor:segs.map(s=>s.c),borderColor:'#0b0f1a',borderWidth:3}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'70%',
      plugins:{legend:{position:'right',labels:{color:'#8892b0',font:{size:11,family:"'Outfit'"},boxWidth:10,padding:10}},
               tooltip:{backgroundColor:'#1a2038',callbacks:{label:ctx=>` ${fmtFull(ctx.raw)}`}}}}
  }),[segs.map(s=>s.v).join(',')]);
  return html`<div style="position:relative;height:170px"><canvas ref=${r}></canvas></div>`;
};

   TAB 2 — PORTFOLIO (comparison chart + leaderboard)
═══════════════════════════════════════════════════════════════ */
const Portfolio=({s})=>{
  const[metric,setMetric]=useState('value');

  const allYears=useMemo(()=>{
    const min=Math.min(...s.properties.map(p=>p.yr));
    return Array.from({length:2026-min+1},(_,i)=>min+i);
  },[]);

  const datasets=useMemo(()=>s.properties.map((p,i)=>({
    label:p.name,
    data:allYears.map(yr=>{
      const sn=p.snaps.find(s=>s.year===yr);
      if(!sn)return null;
      return metric==='value'?sn.value:metric==='yield'?sn.grossY:metric==='equity'?sn.equity:sn.netY;
    }),
    borderColor:PC[i],backgroundColor:PC[i]+'15',
    fill:false,tension:.4,pointRadius:2,pointHoverRadius:5,borderWidth:2,spanGaps:true,
  })),[metric]);

  const yFmt=metric==='value'||metric==='equity'
    ?v=>v>=1e6?`$${(v/1e6).toFixed(1)}M`:`$${(v/1e3).toFixed(0)}k`
    :v=>`${(v||0).toFixed(2)}%`;

  // Portfolio totals (from latest snap)
  const totals=useMemo(()=>{
    const totalV=s.properties.reduce((a,p)=>a+p.val,0);
    const totalE=s.properties.reduce((a,p)=>{const sn=p.snaps[p.snaps.length-1]||{};return a+(sn.equity||p.val-p.loan)},0);
    const totalR=s.properties.reduce((a,p)=>a+p.rent,0);
    return{totalV,totalE,totalR,avgY:(totalR*52/totalV*100)};
  },[s.properties]);

  // Leaderboard
  const leaders=useMemo(()=>s.properties.map((p,i)=>{
    const sn=p.snaps[p.snaps.length-1]||{};
    const s0=p.snaps[0]||{};
    return{...p,col:PC[i],
      grossY:sn.grossY||0,netY:sn.netY||0,
      capGain:s0.value?(p.val-p.cost)/p.cost*100:0,
      equity:sn.equity||p.val-p.loan};
  }).sort((a,b)=>b.grossY-a.grossY),[s.properties]);

  return html`
    <div class="page">
      <div class="page-title">Portfolio</div>

      <!-- 4-metric summary -->
      <div class="card">
        <div class="grid-4">
          ${[['Value',fmt(totals.totalV),'var(--gold)'],['Equity',fmt(totals.totalE),'var(--green)'],
             ['Rent/wk','$'+totals.totalR,'var(--blue)'],['Avg Yield',totals.avgY.toFixed(2)+'%','var(--purple)']].map(([l,v,col])=>html`
            <div class="stat-block" style="text-align:center;padding:2px">
              <div class="label" style="font-size:9px">${l}</div>
              <div style="font-family:var(--mono);font-size:12px;color:${col};font-weight:700;margin-top:4px">${v}</div>
            </div>
          `)}
        </div>
      </div>

      <!-- Comparison chart -->
      <div class="card">
        <div class="flex-between" style="margin-bottom:10px">
          <div style="font-weight:800;font-size:14px">All Properties</div>
          <div style="display:flex;gap:4px">
            ${[['value','Value'],['yield','Gross %'],['equity','Equity'],['netY','Net %']].map(([m,l])=>html`
              <button class="metric-btn"
                style="background:${metric===m?'var(--gold)':'var(--bg3)'};color:${metric===m?'var(--bg)':'var(--muted)'};font-size:10px;padding:4px 8px"
                onClick=${()=>setMetric(m)}>${l}</button>
            `)}
          </div>
        </div>
        <${MultiLine} datasets=${datasets} labels=${allYears} yFmt=${yFmt} />
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px">
          ${s.properties.map((p,i)=>html`
            <div style="display:flex;align-items:center;gap:5px;font-size:11px">
              <div style="width:14px;height:2px;border-radius:1px;background:${PC[i]}"></div>${p.name}
            </div>
          `)}
        </div>
      </div>

      <!-- Leaderboard -->
      <div class="section-title">Yield Leaderboard <span style="color:var(--red);text-transform:none;letter-spacing:0">— 6% benchmark line</span></div>
      ${leaders.map((p,i)=>{
        const barW=Math.min(100,p.grossY/8*100);
        const bench=6/8*100;
        return html`
          <div class="card" style="margin-bottom:8px">
            <div class="flex-between">
              <div style="display:flex;align-items:center;gap:10px">
                <div style="font-family:var(--mono);font-size:24px;font-weight:800;color:${p.col};width:26px;line-height:1">${i+1}</div>
                <div>
                  <div style="font-weight:800;font-size:14px">${p.name}</div>
                  <div style="font-size:10px;color:var(--muted)">${p.suburb}${p.trust?' · Trust':''}</div>
                </div>
              </div>
              <div style="text-align:right">
                <div style="font-family:var(--mono);font-size:17px;font-weight:700;color:${p.col}">${p.grossY.toFixed(2)}%</div>
                <div style="font-size:10px;color:var(--muted)">gross yield</div>
              </div>
            </div>
            <!-- Benchmark bar -->
            <div style="position:relative;margin:12px 0 18px">
              <div style="background:var(--bg3);border-radius:4px;height:7px;overflow:visible;position:relative">
                <div style="background:${p.col};width:${barW}%;height:100%;border-radius:4px;opacity:.9"></div>
                <div style="position:absolute;top:-5px;left:${bench}%;width:2px;height:17px;background:var(--red);border-radius:1px;z-index:2"></div>
              </div>
              <div style="position:absolute;top:14px;left:${bench}%;transform:translateX(-50%);font-size:9px;color:var(--red);font-weight:700">6%</div>
            </div>
            <div class="grid-4">
              ${[['Net Yield',p.netY.toFixed(2)+'%','var(--green)'],
                 ['Cap Growth','+'+p.capGain.toFixed(0)+'%','var(--gold)'],
                 ['Equity',fmt(p.equity),'var(--text)'],
                 ['Cost',fmtFull(p.cost),'var(--muted)']].map(([l,v,col])=>html`
                <div class="stat-block">
                  <div class="label" style="font-size:9px">${l}</div>
                  <div style="font-family:var(--mono);font-size:11px;color:${col};font-weight:700;margin-top:2px">${v}</div>
                </div>
              `)}
            </div>
          </div>
        `;
      })}
    </div>
  `;
};

const Drilldown=({prop,col,onBack,onSave})=>{
  const[ct,setCt]=useState('value');
  const[showForm,setShowForm]=useState(false);
  const snaps=prop.snaps;
  const lbls=snaps.map(s=>String(s.year));
  const yoy=snaps.map((s,i)=>i===0?0:+((s.value-snaps[i-1].value)/snaps[i-1].value*100).toFixed(2));
  const latest=snaps[snaps.length-1]||{};

  const[form,setForm]=useState({
    year:2026,value:prop.val,wRent:prop.rent,
    loan:prop.loan,exp:Math.round(prop.rent*52*EXP_RATIO)
  });

  const submit=()=>{
    const yr=+form.year,v=+form.value,wr=+form.wRent,ln=+form.loan,ex=+form.exp;
    const aR=wr*52, int=Math.round(ln*0.061);
    const sn={year:yr,value:v,wRent:wr,aRent:aR,loan:ln,exp:ex,intCost:int,
              grossY:+(aR/v*100).toFixed(3),netY:+((aR-ex-int)/v*100).toFixed(3),equity:v-ln};
    onSave(prop.id,sn);
    setShowForm(false);
  };

  const vFmt=v=>v>=1e6?`$${(v/1e6).toFixed(1)}M`:`$${(v/1e3).toFixed(0)}k`;
  const pFmt=v=>`${(v||0).toFixed(2)}%`;

  return html`
    <div class="page">
      <button class="back-btn" onClick=${onBack}>‹ Back to Properties</button>

      <div class="flex-between" style="margin-bottom:14px">
        <div>
          <div style="font-size:20px;font-weight:800;color:${col}">${prop.name}</div>
          <div style="font-size:11px;color:var(--muted)">${prop.addr} · ${prop.suburb} · Bought ${prop.yr}</div>
        </div>
        <button onClick=${()=>setShowForm(!showForm)}
          style="background:${showForm?'var(--bg3)':'var(--gold)'};color:${showForm?'var(--muted)':'var(--bg)'};border:none;
                 border-radius:8px;padding:7px 12px;font-family:var(--sans);font-size:12px;font-weight:800;cursor:pointer">
          ${showForm?'✕ Cancel':'+ Update'}
        </button>
      </div>

      <!-- Key metrics -->
      <div class="card">
        <div class="grid-4">
          ${[['Value',fmtFull(latest.value||prop.val),'var(--gold)'],
             ['Yield',(latest.grossY||0).toFixed(2)+'%','var(--blue)'],
             ['Net Y',(latest.netY||0).toFixed(2)+'%','var(--purple)'],
             ['Equity',fmt(latest.equity||prop.val-prop.loan),'var(--green)']].map(([l,v,col])=>html`
            <div class="stat-block" style="text-align:center">
              <div class="label" style="font-size:9px">${l}</div>
              <div style="font-family:var(--mono);font-size:12px;color:${col};font-weight:700;margin-top:3px">${v}</div>
            </div>
          `)}
        </div>
        <div class="divider" style="margin:10px 0 8px"></div>
        <div class="grid-3">
          ${[['Purchase',fmtFull(prop.cost),'var(--muted)'],
             ['Gain','+'+fmtFull(prop.val-prop.cost),'var(--green)'],
             ['Rent','$'+prop.rent+'/wk','var(--text)']].map(([l,v,col])=>html`
            <div class="stat-block">
              <div class="label" style="font-size:9px">${l}</div>
              <div style="font-family:var(--mono);font-size:12px;color:${col};margin-top:2px">${v}</div>
            </div>
          `)}
        </div>
      </div>

      <!-- Snapshot form -->
      ${showForm&&html`
        <div class="snap-form">
          <div style="font-weight:800;font-size:13px;color:var(--gold);margin-bottom:10px">Log Annual Snapshot</div>
          ${[['Year','year','1'],['Property Value','value','1000'],['Weekly Rent','wRent','5'],
             ['Loan Balance','loan','1000'],['Annual Expenses','exp','500']].map(([label,key,step])=>html`
            <div class="snap-row">
              <div style="font-size:12px">${label}</div>
              <input class="snap-input" type="number" step=${step} value=${form[key]}
                onInput=${e=>setForm(f=>({...f,[key]:e.target.value}))} />
            </div>
          `)}
          <button class="snap-btn" onClick=${submit}>✓ Save Snapshot</button>
        </div>
      `}

      <!-- Chart tabs -->
      <div class="card" style="margin-top:6px">
        <div class="pill-tabs">
          ${[['value','Value Growth'],['yield','Yield Trend'],['equity','Equity Build'],['growth','Growth pa']].map(([id,l])=>html`
            <button class=${'pill-tab'+(ct===id?' active':'')} onClick=${()=>setCt(id)}>${l}</button>
          `)}
        </div>
        ${ct==='value'&&html`<${LineChart} data=${snaps.map(s=>s.value)} labels=${lbls} color=${col} yFmt=${vFmt} />`}
        ${ct==='yield'&&html`
          <${DualLine} d1=${snaps.map(s=>s.grossY)} d2=${snaps.map(s=>s.netY)}
            l1="Gross" l2="Net" labels=${lbls} c1=${col} c2="var(--green)" yFmt=${pFmt} />
          <div style="display:flex;gap:14px;margin-top:8px">
            ${[[col,'Gross yield'],['var(--green)','Net yield (after expenses & interest)']].map(([c,l])=>html`
              <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)">
                <div style="width:14px;height:2px;background:${c};border-radius:1px"></div>${l}
              </div>
            `)}
          </div>
        `}
        ${ct==='equity'&&html`<${LineChart} data=${snaps.map(s=>s.equity)} labels=${lbls} color="var(--green)" yFmt=${vFmt} />`}
        ${ct==='growth'&&html`<${BarChart} data=${yoy} labels=${lbls} yFmt=${pFmt} />`}
      </div>

      <!-- History table -->
      <div class="section-title">Year-by-Year History</div>
      <div class="history-wrap">
        <table class="history-table">
          <thead><tr>
            <th>Year</th><th>Value</th><th>Rent/wk</th><th>Gross Y</th><th>Net Y</th><th>Equity</th><th>YoY</th>
          </tr></thead>
          <tbody>
            ${[...snaps].reverse().map((sn,i,arr)=>html`
              <tr>
                <td>${sn.year}</td>
                <td style="color:var(--gold)">${fmtFull(sn.value)}</td>
                <td>$${sn.wRent}</td>
                <td style="color:var(--blue)">${sn.grossY.toFixed(2)}%</td>
                <td style="color:var(--purple)">${sn.netY.toFixed(2)}%</td>
                <td style="color:var(--green)">${fmtFull(sn.equity)}</td>
                <td style="color:${i<arr.length-1&&yoy[snaps.length-1-i]>=0?'var(--green)':'var(--red)'}">
                  ${i<arr.length-1?pct(yoy[snaps.length-1-i]):'—'}
                </td>
              </tr>
            `)}
          </tbody>
        </table>
      </div>
    </div>
  `;
};

const PropertiesTab=({s,setS})=>{
  const[selId,setSelId]=useState(null);
  const sel=selId?s.properties.find(p=>p.id===selId):null;
  const selIdx=selId?s.properties.findIndex(p=>p.id===selId):-1;

  const onSave=(pid,newSn)=>{
    const next={...s,properties:s.properties.map(p=>{
      if(p.id!==pid)return p;
      const filtered=p.snaps.filter(sn=>sn.year!==newSn.year);
      const snaps=[...filtered,newSn].sort((a,b)=>a.year-b.year);
      return{...p,snaps,
        val:newSn.year===2026?newSn.value:p.val,
        rent:newSn.year===2026?newSn.wRent:p.rent,
        loan:newSn.year===2026?newSn.loan:p.loan};
    })};
    localStorage.setItem(STORAGE_KEY,JSON.stringify(next));
    setS(next);
  };

  if(sel) return html`<${Drilldown} prop=${sel} col=${PC[selIdx]} onBack=${()=>setSelId(null)} onSave=${onSave} />`;

  return html`
    <div class="page">
      <div class="page-title">Properties</div>

      <div class="section-title">Investment Properties · Tap to drill down</div>
      ${s.properties.map((p,i)=>{

/* ═══════════════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════════════ */
const TABS=[
  {id:'overview',  icon:'◈',label:'Overview'},
  {id:'portfolio', icon:'◎',label:'Portfolio'},
  {id:'properties',icon:'⬡',label:'Properties'},
  {id:'invest',    icon:'◉',label:'Invest'},
  {id:'forecast',  icon:'◬',label:'Forecast'},
];

const App=()=>{
  const[s,setS]=useState(()=>{
    try{const d=JSON.parse(localStorage.getItem(STORAGE_KEY));return d||DEFAULT;}
    catch{return DEFAULT;}
  });
  const[tab,setTab]=useState('overview');
  const[ip,setIp]=useState(null);

  useEffect(()=>{
    const h=e=>{e.preventDefault();setIp(e);};
    window.addEventListener('beforeinstallprompt',h);
    return()=>window.removeEventListener('beforeinstallprompt',h);
  },[]);

  const onInstall=async()=>{
    if(!ip)return;ip.prompt();await ip.userChoice;setIp(null);
  };

  const c=useMemo(()=>calcAll(s),[s]);

  const CONTENT={
    overview:  html`<${Overview}    s=${s} c=${c} installPrompt=${ip} onInstall=${onInstall} />`,
    portfolio: html`<${Portfolio}   s=${s} />`,
    properties:html`<${PropertiesTab} s=${s} setS=${setS} />`,
    invest:    html`<${Invest}      s=${s} c=${c} />`,
    forecast:  html`<${Forecast}   s=${s} setS=${setS} />`,
  };

  return html`
    <>
      <div key=${tab}>${CONTENT[tab]}</div>
      <nav class="nav">
        ${TABS.map(t=>html`
          <button class=${'nav-btn'+(tab===t.id?' active':'')} onClick=${()=>setTab(t.id)}>
            <span class="nav-icon">${t.icon}</span>
            <span class="nav-label">${t.label}</span>
          </button>
        `)}
      </nav>
    </>
  `;
};

render(html`<${App}/>`,document.getElementById('app'));

if('serviceWorker'in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
</body>
</html>
