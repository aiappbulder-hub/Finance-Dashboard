<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#060810">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Trent's Finance Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- No ES modules. Four reliable UMD builds via script tags. -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#060810;--bg2:#101522;--bg3:#141926;
      --border:#1c2540;--border2:#253060;
      --gold:#f0b429;--gold2:#ffd166;--gold-bg:rgba(240,180,41,.09);
      --green:#34d399;--green-bg:rgba(52,211,153,.09);
      --red:#f87171;--red-bg:rgba(248,113,113,.09);
      --blue:#60a5fa;--purple:#a78bfa;
      --text:#dde4f0;--muted:#5a6a88;--dim:#1c2540;
      --mono:'Space Mono',monospace;--sans:'Outfit',sans-serif;
      --nav-h:65px;
    }
    html,body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    #app{max-width:480px;margin:0 auto;min-height:100dvh}
    .page{padding:calc(env(safe-area-inset-top)+18px) 16px calc(var(--nav-h)+env(safe-area-inset-bottom)+20px);animation:fadeUp .22s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
    .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--nav-h)+env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(5,7,15,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--muted);cursor:pointer;padding:8px 4px;transition:color .2s;-webkit-tap-highlight-color:transparent}
    .nav-btn.active{color:var(--gold)}
    .nav-icon{font-size:18px;line-height:1}
    .nav-label{font-size:10px;font-weight:600;letter-spacing:.03em}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
    .card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px}
    .page-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:14px}
    .sec{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:18px 0 8px}
    .big-num{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--gold);letter-spacing:-.02em;line-height:1}
    .med-num{font-family:var(--mono);font-size:17px;font-weight:700;line-height:1}
    .sm-num{font-family:var(--mono);font-size:13px;line-height:1}
    .lbl{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
    .tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:4px}
    .tag-gold{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(240,180,41,.25)}
    .tag-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.25)}
    .tag-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.25)}
    .tag-blue{background:rgba(96,165,250,.09);color:var(--blue);border:1px solid rgba(96,165,250,.25)}
    .tag-purple{background:rgba(167,139,250,.09);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
    .fb{display:flex;align-items:center;justify-content:space-between}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}

    .cdg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:8px}
    .cdu{background:var(--bg3);border-radius:10px;padding:8px 4px;text-align:center}
    .cdn{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--gold);line-height:1}
    .cdl{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600;letter-spacing:.06em}
    .pills{display:flex;background:var(--bg3);border-radius:10px;padding:3px;gap:2px;margin-bottom:12px}
    .pill{flex:1;padding:7px 4px;border:none;background:none;color:var(--muted);border-radius:7px;font-family:var(--sans);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
    .pill.on{background:var(--bg2);color:var(--gold);box-shadow:0 1px 6px rgba(0,0,0,.5)}
    .mbtn{padding:5px 9px;border-radius:6px;border:none;cursor:pointer;font-family:var(--sans);font-size:10px;font-weight:700;-webkit-tap-highlight-color:transparent}
    .plc{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;-webkit-tap-highlight-color:transparent}
    .plc:active{opacity:.7}
    .pacc{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:52px}
    .back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;padding:0;margin-bottom:14px;-webkit-tap-highlight-color:transparent}
    .chwrap{position:relative;height:185px;margin-top:10px}
    .inv-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
    .inv-row:last-child{border-bottom:none}
    .tkr{font-family:var(--mono);font-size:10px;font-weight:700;background:var(--bg3);border:1px solid var(--border2);color:var(--muted);padding:2px 6px;border-radius:4px}
    .hwrap{overflow-x:auto;margin-top:10px;border-radius:10px;border:1px solid var(--border)}
    .htbl{width:100%;border-collapse:collapse;min-width:360px}
    .htbl th{color:var(--muted);font-weight:700;font-size:9px;letter-spacing:.04em;text-transform:uppercase;padding:8px;text-align:right;background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap}
    .htbl th:first-child{text-align:left}
    .htbl td{padding:7px 8px;border-bottom:1px solid var(--dim);font-family:var(--mono);text-align:right;font-size:11px;white-space:nowrap}
    .htbl td:first-child{text-align:left;font-family:var(--sans);font-weight:600;font-size:11px;color:var(--muted)}
    .htbl tr:last-child td{border-bottom:none;color:var(--gold);font-weight:700}
    .htbl tr:last-child td:first-child{color:var(--gold)}
    .snap{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-top:8px}
    .snap-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .snap-in{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 10px;width:130px;text-align:right;-webkit-appearance:none}
    .snap-in:focus{outline:none;border-color:var(--gold)}
    .snap-btn{background:var(--gold);color:var(--bg);border:none;border-radius:8px;padding:10px;font-family:var(--sans);font-size:13px;font-weight:800;cursor:pointer;width:100%;margin-top:6px}
    .si{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
    .si:last-child{border-bottom:none}
    .si-in{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 10px;text-align:right;width:115px;-webkit-appearance:none}
    .si-in:focus{outline:none;border-color:var(--gold)}
    .btn-d{background:var(--red-bg);border:1px solid rgba(248,113,113,.3);color:var(--red);border-radius:10px;padding:12px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
    .ph{border-radius:0 12px 12px 0;padding:12px 14px 12px 16px;margin-bottom:8px;background:var(--bg2);border:1px solid var(--border);border-left-width:3px}
    .ib{background:linear-gradient(135deg,var(--gold-bg),rgba(240,180,41,.12));border:1px solid rgba(240,180,41,.3);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .ib-btn{background:var(--gold);color:var(--bg);border:none;border-radius:8px;padding:7px 14px;font-family:var(--sans);font-size:12px;font-weight:800;cursor:pointer}
    .ldg{display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:14px}
    @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
    .ldg-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 1s ease infinite}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
  </style>
</head>
<body>
<div id="app"><div class="ldg"><div class="ldg-dot"></div><span style="color:#5a6a88;font-size:13px;font-family:sans-serif">Loading…</span></div></div>
<script>
// ─── Wire up globals ───────────────────────────────────────────
// React 18, Chart.js 4, htm — all loaded as UMD script tags above

// Adapter: lets us write class="" and style="string" like normal HTML
// and silently converts them to what React needs.
function parseStyle(str) {
  var o = {};
  str.split(';').forEach(function(r) {
    var i = r.indexOf(':');
    if (i < 0) return;
    var k = r.slice(0,i).trim().replace(/-([a-z])/g, function(_,c){return c.toUpperCase();});
    var v = r.slice(i+1).trim();
    if (k && v) o[k] = v;
  });
  return o;
}
function h() {
  var type = arguments[0], props = arguments[1];
  if (props != null && typeof type === 'string') {
    if (props['class'] != null) { props.className = props['class']; delete props['class']; }
    if (typeof props.style === 'string') props.style = parseStyle(props.style);
  }
  return React.createElement.apply(React, arguments);
}
var html     = htm.bind(h);
var useState  = React.useState;
var useEffect = React.useEffect;
var useRef    = React.useRef;
var useMemo   = React.useMemo;
var Fragment  = React.Fragment;

// ─── Constants ────────────────────────────────────────────────
var SKEY = 'findash_v5';
var EXP  = 0.22;           // 22% expense ratio: mgmt ~8% + rates + insurance + maintenance
var PC   = ['#f0b429','#34d399','#60a5fa','#a78bfa'];

// ─── Seed historical snapshots from purchase year to 2026 ─────
function seedSnaps(p) {
  var n = 2026 - p.yr; if (n <= 0) return [];
  var vgr = Math.pow(p.val / p.cost, 1/n) - 1;
  var initRent = p.rent / Math.pow(1.035, n);
  var initLoan = p.cost * 0.78;
  var out = [];
  for (var i = 0; i <= n; i++) {
    var yr    = p.yr + i;
    var val   = Math.round(p.cost * Math.pow(1+vgr, i));
    var wRent = Math.round(initRent * Math.pow(1.035, i));
    var aRent = wRent * 52;
    var loan  = Math.max(p.loan, Math.round(initLoan * Math.pow(0.92, i)));
    var exp   = Math.round(aRent * EXP);
    var intC  = Math.round(loan * 0.061);
    out.push({ year:yr, value:val, wRent:wRent, aRent:aRent, loan:loan, exp:exp, intC:intC,
               grossY: +(aRent/val*100).toFixed(3),
               netY:   +((aRent-exp-intC)/val*100).toFixed(3),
               equity: val-loan });
  }
  return out;
}

var PROPS_RAW = [
  {id:1,name:'Doveton 1',        suburb:'Doveton',   addr:'1/66 Power Rd',     yr:2003,cost:138000,val:475000,rent:380,loan:25000},
  {id:2,name:'Doveton 2',        suburb:'Doveton',   addr:'2/66 Power Rd',     yr:2011,cost:210000,val:475000,rent:420,loan:25000},
  {id:3,name:'Pakenham',         suburb:'Pakenham',  addr:'6/31 Syme Rd',      yr:2018,cost:350000,val:508000,rent:500,loan:25000},
  {id:4,name:'Reservoir (Trust)',suburb:'Reservoir', addr:'5/29 Macartney St', yr:2014,cost:188000,val:330000,rent:400,loan:25000,trust:true},
];

var DEFAULT = {
  age:46, retAge:55, superAge:60, salary:97000,
  dfMonths:18, target:80000,
  pprVal:550000, totalLoan:100000, loanRate:6.09,
  expRatio:22, rentGrow:3.5, propGrow:5.0,
  superBal:351000, superContrib:11155, superGrow:7.0,
  usUSD:38042, audusd:0.634,
  asxP:11507, asxT:6270, crypto:28496, invGrow:7.0,
  props: PROPS_RAW.map(function(p){return Object.assign({},p,{snaps:seedSnaps(p)});})
};

// Holdings from CSV exports — 14 May 2026
var CRYPTO = [
  {t:'BNB', n:'BNB Chain',      v:13697.83,g:21.06, qty:14.82},
  {t:'BTC', n:'Bitcoin',        v:6563.08, g:0.80,  qty:0.06},

  {t:'AVAX',n:'Avalanche',      v:77.69,   g:-87.42,qty:5.8},
  {t:'DOGE',n:'Dogecoin',       v:48.44,   g:-48.25,qty:312},
];
var US = [
  {t:'TSLA',n:'Tesla',   u:31904.37,g:90.55, qty:52.0},
  {t:'PLTR',n:'Palantir',u:3611.95, g:548.46,qty:20.1},
  {t:'GOOG',n:'Alphabet',u:1741.63, g:157.37,qty:3.17},
  {t:'AAPL',n:'Apple',   u:412.47,  g:168.73,qty:1},
  {t:'AMZN',n:'Amazon',  u:371.77,  g:40.54, qty:1},
];
var ASX = [
  {t:'RIO.AX',n:'Rio Tinto',        v:6993.00,g:265.43,trust:false,qty:37,   px:189.00},
  {t:'MPL.AX',n:'Medibank Private', v:6270.00,g:128.00,trust:true, qty:1375, px:4.56},
  {t:'REH.AX',n:'Reece Ltd',        v:2315.04,g:-22.55,trust:false,qty:182,  px:12.72},

];

// ─── Helpers ──────────────────────────────────────────────────
function ff(n){ return '$'+Math.round(n||0).toLocaleString('en-AU'); }
function fm(n){ if(!n||isNaN(n))return'$0'; if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M'; if(n>=1e3)return'$'+(n/1e3).toFixed(0)+'k'; return'$'+Math.round(n); }
function pc(n){ return(n>=0?'+':'')+(n||0).toFixed(1)+'%'; }
function cc(n){ return n>=0?'var(--green)':'var(--red)'; }

// ─── Financial calculations ───────────────────────────────────
function calc(s) {
  var gr = s.props.reduce(function(a,p){return a+p.rent*52;},0);
  var nr = gr*(1-s.expRatio/100) - s.totalLoan*s.loanRate/100;
  var ipV= s.props.reduce(function(a,p){return a+p.val;},0);
  var pV = ipV+s.pprVal;
  var pE = pV-s.totalLoan;
  var usA= s.usUSD/s.audusd;
  var inv= usA+s.asxP+s.asxT+s.crypto;
  var nw = pE+s.superBal+inv;
  var yR = Math.max(0,s.retAge-s.age);
  var yS = Math.max(0,s.superAge-s.age);
  var now= new Date();
  var rd = new Date(now); rd.setFullYear(now.getFullYear()+yR);
  var dd = new Date(now); dd.setMonth(now.getMonth()+s.dfMonths);
  var rtD= Math.max(0,Math.round((rd-now)/864e5));
  var dfD= Math.max(0,Math.round((dd-now)/864e5));
  var r  = s.superGrow/100;
  var sp = Array.from({length:21},function(_,i){
    return i===0?Math.round(s.superBal):Math.round(s.superBal*Math.pow(1+r,i)+s.superContrib*((Math.pow(1+r,i)-1)/r));
  });
  var sa = sp[Math.min(yS,20)];
  var pp = Array.from({length:16},function(_,i){
    return Math.round(gr*Math.pow(1+s.rentGrow/100,i)*(1-s.expRatio/100)-(i<s.dfMonths/12?s.totalLoan*s.loanRate/100:0));
  });
  var nwp= Array.from({length:21},function(_,i){
    return Math.round(pV*Math.pow(1+s.propGrow/100,i)-Math.max(0,s.totalLoan*Math.pow(.88,i))+sp[Math.min(i,20)]+inv*Math.pow(1+s.invGrow/100,i));
  });
  return {gr:gr,nr:nr,pV:pV,ipV:ipV,pE:pE,usA:usA,inv:inv,nw:nw,
    yR:yR,sa:sa,sp:sp,pp:pp,nwp:nwp,
    gY:gr/ipV*100, pNow:Math.min(100,nr/s.target*100),
    pPost:Math.min(100,pp[Math.ceil(s.dfMonths/12)]/s.target*100),
    rd:rd,dd:dd,
    rYr:Math.floor(rtD/365),rMo:Math.floor((rtD%365)/30),rDy:rtD%30,
    dYr:Math.floor(dfD/365),dMo:Math.floor((dfD%365)/30),dDy:dfD%30,
    retP:pp[Math.min(yR,15)], retNW:nwp[Math.min(yR,20)]};
}

// ─── Chart helpers ────────────────────────────────────────────
function mkOpts(yf) {
  return {responsive:true,maintainAspectRatio:false,
    interaction:{intersect:false,mode:'index'},
    plugins:{legend:{display:false},
      tooltip:{backgroundColor:'#1a2038',titleColor:'#8892b0',borderColor:'#1e2a45',borderWidth:1,
               callbacks:{label:function(ctx){return ' '+(ctx.dataset.label||'')+' '+yf(ctx.raw);}}}},
    scales:{
      y:{ticks:{color:'#5a6a88',font:{family:"'Space Mono'",size:10},callback:yf},grid:{color:'#1c2540'},border:{display:false}},
      x:{ticks:{color:'#5a6a88',font:{size:10},maxTicksLimit:8},grid:{display:false},border:{display:false}}
    }};
}
function useChart(factory,deps) {
  var r=useRef(null),ch=useRef(null);
  useEffect(function(){
    if(!r.current)return;
    if(ch.current)ch.current.destroy();
    ch.current=factory(r.current);
    return function(){if(ch.current)ch.current.destroy();};
  },deps);
  return r;
}

function LineChart(p) {
  var yf=p.yFmt||function(v){return v;};
  var ref=useChart(function(c){return new Chart(c,{type:'line',
    data:{labels:p.labels,datasets:[{data:p.data,borderColor:p.color||'#f0b429',
          backgroundColor:(p.color||'#f0b429')+'18',fill:true,tension:.4,pointRadius:0,pointHoverRadius:5,borderWidth:2}]},
    options:mkOpts(yf)});
  },[p.data.join(','),p.color]);
  return html`<div class="chwrap"><canvas ref=${ref}></canvas></div>`;
}
function DualLine(p) {
  var yf=p.yFmt||function(v){return v;};
  var ref=useChart(function(c){return new Chart(c,{type:'line',
    data:{labels:p.labels,datasets:[
      {label:p.l1,data:p.d1,borderColor:p.c1,backgroundColor:p.c1+'18',fill:true,tension:.4,pointRadius:0,borderWidth:2},
      {label:p.l2,data:p.d2,borderColor:p.c2,fill:false,tension:.4,pointRadius:0,borderWidth:2,borderDash:[5,4]},
    ]},options:mkOpts(yf)});
  },[p.d1.join(','),p.d2.join(',')]);
  return html`<div class="chwrap"><canvas ref=${ref}></canvas></div>`;
}
function BarChart(p) {
  var yf=p.yFmt||function(v){return v;};
  var ref=useChart(function(c){return new Chart(c,{type:'bar',
    data:{labels:p.labels,datasets:[{data:p.data,
      backgroundColor:p.data.map(function(v){return v>=0?'rgba(240,180,41,.7)':'rgba(248,113,113,.7)';}),
      borderColor:p.data.map(function(v){return v>=0?'#f0b429':'#f87171';}),borderWidth:1,borderRadius:3}]},
    options:mkOpts(yf)});
  },[p.data.join(',')]);
  return html`<div class="chwrap"><canvas ref=${ref}></canvas></div>`;
}
function MultiLine(p) {

// ─── PROPERTY DRILL-DOWN ─────────────────────────────────────
function Drilldown(p) {
  var prop=p.prop,col=p.col,onBack=p.onBack,onSave=p.onSave;
  var ct=useState('value');var setCt=ct[1];ct=ct[0];
  var sf=useState(false);var setSf=sf[1];sf=sf[0];
  var snaps=prop.snaps,lbls=snaps.map(function(s){return String(s.year);});
  var yoy=snaps.map(function(s,i){return i===0?0:+((s.value-snaps[i-1].value)/snaps[i-1].value*100).toFixed(2);});
  var lat=snaps[snaps.length-1]||{};
  var fm_=useState({year:2026,value:prop.val,wRent:prop.rent,loan:prop.loan,exp:Math.round(prop.rent*52*EXP)});
  var setFm=fm_[1];fm_=fm_[0];
  var vf=function(v){return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':'$'+(v/1e3).toFixed(0)+'k';};
  var pf=function(v){return(v||0).toFixed(2)+'%';};
  function submit(){
    var yr=+fm_.year,v=+fm_.value,wr=+fm_.wRent,ln=+fm_.loan,ex=+fm_.exp;
    var aR=wr*52,int=Math.round(ln*0.061);
    onSave(prop.id,{year:yr,value:v,wRent:wr,aRent:aR,loan:ln,exp:ex,intC:int,
      grossY:+(aR/v*100).toFixed(3),netY:+((aR-ex-int)/v*100).toFixed(3),equity:v-ln});
    setSf(false);

      </div>

      <div class="card">
        <div class="g4">
          ${[['Value',ff(lat.value||prop.val),'var(--gold)'],['Yield',(lat.grossY||0).toFixed(2)+'%','var(--blue)'],['Net Y',(lat.netY||0).toFixed(2)+'%','var(--purple)'],['Equity',fm(lat.equity||prop.val-prop.loan),'var(--green)']].map(function(r){
            return html`<div class="sb" style="text-align:center"><div class="lbl" style="font-size:9px">${r[0]}</div><div style="font-family:var(--mono);font-size:12px;color:${r[2]};font-weight:700;margin-top:3px">${r[1]}</div></div>`;
          })}
        </div>
        <div class="div" style="margin:10px 0 8px"></div>
        <div class="g3">
          ${[['Purchase',ff(prop.cost),'var(--muted)'],['Capital Gain','+'+ff(prop.val-prop.cost),'var(--green)'],['Rent','$'+prop.rent+'/wk','var(--text)']].map(function(r){
            return html`<div class="sb"><div class="lbl" style="font-size:9px">${r[0]}</div><div style="font-family:var(--mono);font-size:12px;color:${r[2]};margin-top:2px">${r[1]}</div></div>`;
          })}
        </div>
      </div>

      ${sf && html`
        <div class="snap">
          <div style="font-weight:800;font-size:13px;color:var(--gold);margin-bottom:10px">Log Annual Snapshot</div>
          ${[['Year','year','1'],['Property Value','value','1000'],['Weekly Rent','wRent','5'],['Loan Balance','loan','1000'],['Annual Expenses','exp','500']].map(function(r){
            return html`<div class="snap-row">
              <div style="font-size:12px">${r[0]}</div>
              <input class="snap-in" type="number" step=${r[2]} value=${fm_[r[1]]}

            </div>`;
          })}
          <button class="snap-btn" onClick=${submit}>✓ Save Snapshot</button>
        </div>
      `}

      <div class="card" style="margin-top:6px">
        <div class="pills">
          ${[['value','Value Growth'],['yield','Yield Trend'],['equity','Equity Build'],['growth','Growth pa']].map(function(t){
            return html`<button class=${'pill'+(ct===t[0]?' on':'')} onClick=${function(){setCt(t[0]);}}>${t[1]}</button>`;
          })}
        </div>
        ${ct==='value' && html`<${LineChart} data=${snaps.map(function(s){return s.value;})} labels=${lbls} color=${col} yFmt=${vf} />`}
        ${ct==='yield' && html`
          <${DualLine} d1=${snaps.map(function(s){return s.grossY;})} d2=${snaps.map(function(s){return s.netY;})} l1="Gross" l2="Net" labels=${lbls} c1=${col} c2="var(--green)" yFmt=${pf} />
          <div style="display:flex;gap:14px;margin-top:8px">

            <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)"><div style="width:14px;height:2px;background:var(--green);border-radius:1px"></div>Net yield</div>

function TabProperties(p) {

    var next=Object.assign({},s,{props:s.props.map(function(x){
      if(x.id!==pid)return x;
      var f=x.snaps.filter(function(z){return z.year!==sn.year;});

// ─── TAB: INVEST ─────────────────────────────────────────────
var CGIDS={BNB:'binancecoin',BTC:'bitcoin',ETH:'ethereum',SOL:'solana',XRP:'ripple',DOT:'polkadot',AVAX:'avalanche-2',DOGE:'dogecoin'};

function TabInvest(p) {
  var s=p.s,c=p.c;
  var _lp=useState({});var livePx=_lp[0],setLivePx=_lp[1];
  var _ls=useState('loading');var liveStatus=_ls[0],setLiveStatus=_ls[1];
  var _lt=useState(null);var lastUp=_lt[0],setLastUp=_lt[1];

  function fetchLive(){
    var cgIds=CRYPTO.map(function(coin){return CGIDS[coin.t];}).filter(Boolean).join(',');
    var newPx={};var anyLive=false;
    var cReq=fetch('https://api.coingecko.com/api/v3/simple/price?ids='+cgIds+'&vs_currencies=aud&include_24hr_change=true')
      .then(function(r){return r.json();})
      .then(function(d){
        CRYPTO.forEach(function(coin){var id=CGIDS[coin.t];if(d[id]){newPx[coin.t]={price:d[id].aud,chg:d[id].aud_24h_change||0,live:true};anyLive=true;}});
      }).catch(function(){});
    var tickers=US.map(function(st){return{t:st.t,isUS:true};}).concat(ASX.map(function(st){return{t:st.t,isUS:false};}));
    var sReqs=tickers.map(function(tk){
      return fetch('https://query1.finance.yahoo.com/v8/finance/chart/'+tk.t+'?interval=1d&range=1d&includePrePost=false')
        .then(function(r){return r.json();})
        .then(function(d){
          var m=((d.chart||{}).result||[{}])[0].meta||{};
          if(m.regularMarketPrice){
            var chg=m.previousClose?(m.regularMarketPrice-m.previousClose)/m.previousClose*100:0;
            newPx[tk.t]={price:m.regularMarketPrice,chg:chg,live:true,usd:tk.isUS};anyLive=true;
          }
        }).catch(function(){});
    });
    Promise.all([cReq].concat(sReqs)).then(function(){
      setLivePx(newPx);
      setLiveStatus(anyLive?'live':'offline');
      if(anyLive)setLastUp(new Date());
    });
  }
  useEffect(function(){fetchLive();var iv=setInterval(fetchLive,300000);return function(){clearInterval(iv);};},[]);

  function liveVal(ticker,qty,audusd){
    var lp=livePx[ticker];
    if(!lp||!lp.live)return null;
    return lp.usd?(lp.price*qty/audusd):(lp.price*qty);
  }
  function liveRow(ticker){return livePx[ticker]&&livePx[ticker].live?livePx[ticker]:null;}

  var statusLabel=liveStatus==='loading'?'Fetching live prices…':liveStatus==='live'?('Live · '+lastUp.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})):'Offline · showing last known';
  var statusCol=liveStatus==='live'?'var(--green)':liveStatus==='loading'?'var(--muted)':'var(--gold)';

  var usTotal=US.reduce(function(a,st){var v=liveVal(st.t,st.qty,s.audusd);return a+(v!==null?v:st.u/s.audusd);},0);
  var asxTotal=ASX.reduce(function(a,st){var v=liveVal(st.t,st.qty,s.audusd);return a+(v!==null?v:st.v);},0);
  var cryptoTotal=CRYPTO.reduce(function(a,coin){var v=liveVal(coin.t,coin.qty,s.audusd);return a+(v!==null?v:coin.v);},0);

  return html`
    <div class="page">
      <div class="fb" style="margin-bottom:14px">
        <div class="page-title" style="margin-bottom:0">Investments</div>
        <div style="display:flex;align-items:center;gap:5px">
          <div style="width:6px;height:6px;border-radius:50%;background:${statusCol};${liveStatus==='live'?'animation:pulse 2s ease infinite':''}"></div>
          <span style="font-size:10px;color:${statusCol};font-weight:600">${statusLabel}</span>
        </div>
      </div>

      <div class="card">
        <div class="lbl" style="margin-bottom:10px">TOTAL PORTFOLIO BREAKDOWN</div>
        <${DonutChart} segs=${[{l:'Superannuation',v:s.superBal,c:'#60a5fa'},{l:'US Stocks',v:usTotal,c:'#f0b429'},{l:'ASX Shares',v:asxTotal,c:'#34d399'},{l:'Crypto',v:cryptoTotal,c:'#a78bfa'}]} />
        <div class="div" style="margin:10px 0"></div>
        <div class="fb"><div class="lbl">TOTAL (EX-PROPERTY)</div><div style="font-family:var(--mono);font-size:15px;color:var(--gold);font-weight:700">${ff(s.superBal+usTotal+asxTotal+cryptoTotal)}</div></div>
      </div>

      <div class="sec">Superannuation</div>
      <div class="card" style="background:rgba(96,165,250,.04);border-color:rgba(96,165,250,.25)">
        <div class="fb">
          <div><div style="font-weight:800;font-size:15px;color:var(--blue)">Super Fund</div><div style="font-size:11px;color:var(--muted);margin-top:2px">SGC 11.5% · $${s.salary.toLocaleString()} salary</div></div>
          <div style="text-align:right"><div class="sm-num" style="color:var(--blue)">${ff(s.superBal)}</div><div style="font-size:10px;color:var(--muted)">+${ff(s.superContrib)}/yr</div></div>
        </div>
        <div class="div"></div>
        <div class="g3">
          ${[['Projected @'+s.superAge,ff(c.sa),'var(--gold)'],['Growth Rate',s.superGrow+'% p.a.','var(--text)'],['Years to access',Math.max(0,s.superAge-s.age)+' yrs','var(--muted)']].map(function(r){
            return html`<div class="sb"><div class="lbl" style="font-size:9px">${r[0]}</div><div style="font-family:var(--mono);font-size:12px;color:${r[2]};font-weight:700;margin-top:2px">${r[1]}</div></div>`;
          })}
        </div>
      </div>

      <div class="sec">US Stocks <span style="font-size:10px;color:var(--muted);text-transform:none;letter-spacing:0">AUD@${s.audusd}</span></div>
      <div class="card">
        ${US.map(function(st){
          var lr=liveRow(st.t);
          var val=lr?(lr.price*st.qty/s.audusd):(st.u/s.audusd);
          var chg=lr?lr.chg:st.g;
          var sub=lr?('US$'+lr.price.toFixed(2)+' · '+st.qty+' shares'):(st.qty+' shares');
          return html`<div class="inv-row">
            <div style="display:flex;align-items:center;gap:8px;flex:1"><span class="tkr">${st.t}</span><div><div style="font-size:13px;font-weight:600">${st.n}</div><div style="font-size:10px;color:var(--muted)">${sub}</div></div></div>
            <div style="text-align:right;flex-shrink:0"><div class="sm-num">${ff(val)}</div><div style="font-size:10px;color:${cc(chg)}">${pc(chg)}${lr?' 24h':''}</div></div>
          </div>`;
        })}
        <div style="display:flex;justify-content:flex-end;padding-top:8px;border-top:1px solid var(--border)"><span class="sm-num" style="color:var(--gold)">AUD ${ff(usTotal)}</span></div>
      </div>

      <div class="sec">ASX Holdings</div>
      <div class="card">
        ${ASX.map(function(st){
          var lr=liveRow(st.t);
          var val=lr?(lr.price*st.qty):st.v;
          var chg=lr?lr.chg:0;
          var sub=lr?('$'+lr.price.toFixed(2)+' · '+st.qty+' shares'+(st.trust?' · Trust':'')):(st.qty+'@$'+st.px+(st.trust?' · Trust':''));
          return html`<div class="inv-row">
            <div style="display:flex;align-items:center;gap:8px;flex:1"><span class="tkr">${st.t}</span><div><div style="font-size:13px;font-weight:600">${st.n}</div><div style="font-size:10px;color:var(--muted)">${sub}</div></div></div>
            <div style="text-align:right"><div class="sm-num">${ff(val)}</div><div style="font-size:10px;color:${cc(chg)}">${pc(chg)}${lr?' 24h':''}</div></div>
          </div>`;
        })}
        <div style="display:flex;justify-content:flex-end;padding-top:8px;border-top:1px solid var(--border)"><span class="sm-num" style="color:var(--gold)">Total ${ff(asxTotal)}</span></div>
      </div>

      <div class="sec">Crypto</div>
      <div class="card">
        ${CRYPTO.map(function(coin){
          var lr=liveRow(coin.t);
          var val=lr?(lr.price*coin.qty):coin.v;
          var chg=lr?lr.chg:coin.g;
          var sub=lr?(coin.qty+' · $'+lr.price.toLocaleString('en-AU',{maximumFractionDigits:2})+' ea'):(coin.qty+' tokens');
          return html`<div class="inv-row">
            <div style="display:flex;align-items:center;gap:8px;flex:1"><span class="tkr">${coin.t}</span><div><div style="font-size:13px;font-weight:600">${coin.n}</div><div style="font-size:10px;color:var(--muted)">${sub}</div></div></div>
            <div style="text-align:right"><div class="sm-num">${ff(val)}</div><div style="font-size:10px;color:${cc(chg)}">${pc(chg)}${lr?' 24h':''}</div></div>
          </div>`;
        })}
        <div style="display:flex;justify-content:flex-end;padding-top:8px;border-top:1px solid var(--border)"><span class="sm-num" style="color:var(--gold)">Total ${ff(cryptoTotal)}</span></div>
      </div>
    </div>`;
}

  var c=useMemo(function(){return calc(s);},[s]);
  var yr=new Date().getFullYear();

  var l15=Array.from({length:16},function(_,i){return"'"+String(yr+i).slice(2);});
  function save(n){localStorage.setItem(SKEY,JSON.stringify(n));setS(n);}
  function sv(k,v){save(Object.assign({},s,{[k]:parseFloat(v)||0}));}
  function F(fp){return html`<div class="si"><div style="font-size:12px">${fp.label}</div><input class="si-in" type="number" step=${fp.step||'1'} value=${s[fp.k]} onInput=${function(e){sv(fp.k,e.target.value);}} /></div>`;}

          <div style="flex:1">
            <div class="g2" style="gap:8px">
              ${[['Net Worth',ff(c.retNW),'var(--gold)'],['Passive/yr',ff(c.retP),'var(--green)'],['Super @'+s.superAge,ff(c.sa),'var(--blue)'],['Monthly',ff(Math.round(c.retP/12))+'/mo','var(--text)']].map(function(r){
                return html`<div><div class="lbl" style="font-size:9px">${r[0]}</div><div style="font-family:var(--mono);font-size:12px;color:${r[2]};font-weight:700;margin-top:1px">${r[1]}</div></div>`;

          </div>
        </div>

      <div class="card">
        <div class="fb"><div><div style="font-weight:800">Net Worth Trajectory</div><div style="font-size:11px;color:var(--muted)">20yr · property ${s.propGrow}% / invest ${s.invGrow}%</div></div><div class="sm-num" style="color:var(--gold)">${fm(c.nwp[20])}</div></div>
        <${LineChart} data=${c.nwp} labels=${l20} color="#f0b429" yFmt=${function(v){return'$'+(v/1e6).toFixed(1)+'M';}} />
      </div>

      <div class="card">

        <${LineChart} data=${c.pp} labels=${l15} color="#34d399" yFmt=${function(v){return'$'+(v/1e3).toFixed(0)+'k';}} />
        <div style="margin-top:8px;padding:8px;background:var(--bg3);border-radius:8px;font-size:11px;color:var(--muted)">📌 Debt-free ${c.dd.toLocaleDateString('en-AU',{month:'short',year:'numeric'})} → +${ff(s.totalLoan*s.loanRate/100)}/yr &nbsp;·&nbsp; Target ${ff(s.target)}/yr</div>
      </div>

      <div class="card">
        <div class="fb"><div><div style="font-weight:800">Superannuation Growth</div><div style="font-size:11px;color:var(--muted)">${s.superGrow}% p.a. · access age ${s.superAge}</div></div><div class="sm-num" style="color:var(--blue)">${fm(c.sa)} @${s.superAge}</div></div>
        <${LineChart} data=${c.sp} labels=${l20} color="#60a5fa" yFmt=${function(v){return'$'+(v/1e3).toFixed(0)+'k';}} />
      </div>

      <div class="sec">Freedom Roadmap</div>
      ${[
        {ph:'1',col:'var(--red)',   title:'Debt Free',      tgt:c.dd.toLocaleDateString('en-AU',{month:'short',year:'numeric'}), desc:'Pay off '+ff(s.totalLoan)+' · unlock +'+ff(s.totalLoan*s.loanRate/100)+'/yr'},
        {ph:'2',col:'var(--gold)',  title:'Buffer Built',   tgt:'Post debt-free', desc:'Maintenance reserve → psychological freedom from surprise bills'},

            <div><div style="font-size:10px;color:${x.col};font-weight:800;letter-spacing:.08em">PHASE ${x.ph}</div><div style="font-weight:800;font-size:14px;margin-top:2px">${x.title}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${x.desc}</div></div>

      <div class="sec" style="margin-top:26px">⚙ Settings & Assumptions</div>

        <${F} label="Loan Rate (%)" k="loanRate" step="0.01" />
        <${F} label="Expense Ratio (% gross rent)" k="expRatio" step="0.5" />
        <${F} label="Annual Rent Growth (%)" k="rentGrow" step="0.1" />
        <${F} label="Annual Property Growth (%)" k="propGrow" step="0.1" />
      </div>
      <div class="card">
        <div style="font-size:11px;font-weight:700;color:var(--blue);margin-bottom:8px">SUPER & INVESTMENTS</div>

        <${F} label="Annual Contributions" k="superContrib" />
        <${F} label="Super Growth Rate (%)" k="superGrow" step="0.1" />

      <div style="font-size:11px;color:var(--muted);text-align:center;padding:14px 0 4px">All data stored locally · never leaves your device</div>
    </div>`;
}

// ─── APP ROOT ─────────────────────────────────────────────────
var TABS = [
  {id:'overview',  icon:'◈',label:'Overview'},
  {id:'portfolio', icon:'◎',label:'Portfolio'},
  {id:'properties',icon:'⬡',label:'Properties'},
  {id:'invest',    icon:'◉',label:'Invest'},
  {id:'forecast',  icon:'◬',label:'Forecast'},
];

function App() {
  var ss=useState(function(){try{var d=JSON.parse(localStorage.getItem(SKEY));return d||DEFAULT;}catch(e){return DEFAULT;}});
  var s=ss[0],setS=ss[1];
  var ts=useState('overview');var tab=ts[0],setTab=ts[1];
  var ips=useState(null);var ip=ips[0],setIp=ips[1];
  useEffect(function(){
    function h(e){e.preventDefault();setIp(e);}
    window.addEventListener('beforeinstallprompt',h);
    return function(){window.removeEventListener('beforeinstallprompt',h);};
  },[]);
  var c=useMemo(function(){return calc(s);},[s]);
  function onI(){if(!ip)return;ip.prompt();ip.userChoice.then(function(){setIp(null);});}
  function renderTab(){
    if(tab==='overview')   return html`<${TabOverview}    s=${s} c=${c} ip=${ip} onI=${onI} />`;
    if(tab==='portfolio')  return html`<${TabPortfolio}   s=${s} />`;
    if(tab==='properties') return html`<${TabProperties}  s=${s} setS=${setS} />`;
    if(tab==='invest')     return html`<${TabInvest}      s=${s} c=${c} />`;
    if(tab==='forecast')   return html`<${TabForecast}    s=${s} setS=${setS} />`;
  }
  return html`
    <div>
      <div key=${tab}>${renderTab()}</div>
      <nav class="nav">
        ${TABS.map(function(t){
          return html`<button class=${'nav-btn'+(tab===t.id?' active':'')} onClick=${function(){setTab(t.id);}}>
            <span class="nav-icon">${t.icon}</span>
            <span class="nav-label">${t.label}</span>
          </button>`;
        })}
      </nav>
    </div>`;
}

ReactDOM.createRoot(document.getElementById('app')).render(html`<${App}/>`);

if('serviceWorker'in navigator)
  window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});
</script>
